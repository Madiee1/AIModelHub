<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSource AI Hub - Discover the Best AI Models</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">AI Hub</a>
                <div class="nav-links">
                    <a href="#hero-section"><i class="fa-solid fa-house"></i> Home</a>
                    <a href="#category-section"><i class="fa-solid fa-bars"></i> Categories</a>
                    <a href="#trending-section"><i class="fa-solid fa-fire"></i> Trending</a>
                    <a href="#recently-added-section"><i class="fa-solid fa-fire"></i> Recently Added</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero-section" class="hero">
            <div class="container">
                <h1>Discover Open-Source AI</h1>
                <p>Explore the latest and most powerful open-source AI models in one place.</p>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="model-search" placeholder="Search models, developers, or categories...">
                </div>
            </div>
        </section>
        <br>

        <section id="search-results-section" class="container" style="display:none;">
            <div class="section-header">
                <h2 id="search-results-label">Search Results</h2>
            </div>
            <div id="search-results-grid" class="model-grid"></div>
        </section>

        <section id="category-section" class="container">
            <div class="section-header">
                <h2>Browse by Category</h2>
            </div>
            <div id="category-grid" class="category-grid">
                <!-- Categories will be injected here -->
            </div>
        </section>
        <br>

        <section id="trending-section" class="container">
            <div class="section-header">
                <h2>Trending Models</h2>
            </div>
            <!-- Row 1 -->
            <div class="carousel-row">
                <button class="carousel-arrow carousel-arrow--left" data-target="trending-row-1"
                    aria-label="Scroll left">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="scroll-wrapper" id="trending-row-1">
                    <div class="model-row" id="trending-grid-1"></div>
                </div>
                <button class="carousel-arrow carousel-arrow--right" data-target="trending-row-1"
                    aria-label="Scroll right">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <!-- Row 2 -->
            <div class="carousel-row" style="margin-top: 20px;">
                <button class="carousel-arrow carousel-arrow--left" data-target="trending-row-2"
                    aria-label="Scroll left">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="scroll-wrapper" id="trending-row-2">
                    <div class="model-row" id="trending-grid-2"></div>
                </div>
                <button class="carousel-arrow carousel-arrow--right" data-target="trending-row-2"
                    aria-label="Scroll right">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>
        <br>

        <section id="recently-added-section" class="container">
            <div class="section-header">
                <h2>Recently Added</h2>
            </div>
            <!-- Row 1 -->
            <div class="carousel-row">
                <button class="carousel-arrow carousel-arrow--left" data-target="recent-row-1" aria-label="Scroll left">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="scroll-wrapper" id="recent-row-1">
                    <div class="model-row" id="recent-grid-1"></div>
                </div>
                <button class="carousel-arrow carousel-arrow--right" data-target="recent-row-1"
                    aria-label="Scroll right">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <!-- Row 2 -->
            <div class="carousel-row" style="margin-top: 20px;">
                <button class="carousel-arrow carousel-arrow--left" data-target="recent-row-2" aria-label="Scroll left">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="scroll-wrapper" id="recent-row-2">
                    <div class="model-row" id="recent-grid-2"></div>
                </div>
                <button class="carousel-arrow carousel-arrow--right" data-target="recent-row-2"
                    aria-label="Scroll right">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 OpenSource AI Hub. All rights reserved.</p>
            <p style="margin-top: 10px; font-size: 0.8rem;">Powered by <b>KVK Technoid</b></p>
        </div>
    </footer>

    <script src="assets/js/models_data.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
