<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - OpenSource AI Hub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="logo">AI Hub</a>
                <div class="nav-links">
                    <a href="../index.html">Home</a>
                    <a href="../index.html#category-section">Categories</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 40px;">
        <div id="category-info" style="margin-bottom: 40px;">
            <h1 id="category-title" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Category Name</h1>
            <p id="category-desc" style="color: var(--text-muted); font-size: 1.1rem;">Category description goes here.</p>
        </div>

        <div id="category-models-grid" class="model-grid">
            <!-- Models for this category will be injected here -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 OpenSource AI Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="../assets/js/models_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const catId = urlParams.get('id');
            
            if (!catId) {
                window.location.href = '../index.html';
                return;
            }

            const category = modelsData.categories.find(c => c.id === catId);
            if (!category) {
                window.location.href = '../index.html';
                return;
            }

            // Update Page Info
            document.title = `${category.name} - OpenSource AI Hub`;
            document.getElementById('category-title').textContent = category.name;
            document.getElementById('category-desc').textContent = category.description;

            // Render Models
            const grid = document.getElementById('category-models-grid');
            const models = modelsData.models.filter(m => m.category === catId);
            
            if (models.length > 0) {
                grid.innerHTML = models.map(model => `
                    <div class="model-card">
                        <div>
                            ${model.tags.map(tag => `<span class="model-badge">${tag}</span>`).join(' ')}
                        </div>
                        <h3 class="model-title">${model.name}</h3>
                        <p class="model-dev">By ${model.developer}</p>
                        <p class="model-desc">${model.description}</p>
                        <div class="model-footer">
                            <a href="${model.link}" target="_blank" class="btn-view">View Model</a>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px;">No models found in this category yet.</p>';
            }
        });
    </script>
</body>
</html>
